{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>B3RC — B3 Running Club</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="video-background">
        <video autoplay muted loop playsinline webkit-playsinline>
            <source src="{% static 'videos/background.mp4' %}" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <header class="navbar">
        <div class="nav-container">
            <img src="{% static 'images/logo.png' %}" alt="B3RC Logo" style="max-width: 80px; margin-bottom: 10px;">
            <nav>
                <ul class="nav-links">
                    <li><a href="#">About</a></li>
                    <li><a href="#activities">Activities</a></li>
                    <li><a href="#">Sponsors</a></li>
                    <li><a href="#">Find Us</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="hero-spacer"></div>
        <section id="activities" class="activities-section">
            <h2 class="activities-title">Activities</h2>
            <div class="activities-grid">
                <div class="activity-card">
                    <h3>WEDNESDAY — QUALITY</h3>
                    <p>Morning quality sessions on Wednesdays.</p>
                    <p class="activity-location">📍 St Lukes Oval, Concord NSW</p>
                </div>
                <div class="activity-card">
                    <h3>SUNDAY — LONG RUN</h3>
                    <p>The most important run in marathon training.</p>
                    <p class="activity-time">🕖 7:00 AM</p>
                    <p class="activity-location">📍 Rhodes Amphitheatre</p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
