{% extends "base.html" %}
{% load static %}

{% block content %}
<main>
    <div class="hero">
        <div class="video-background">
            <video autoplay muted loop playsinline webkit-playsinline>
                <source src="{% static 'videos/background.mp4' %}" type="video/mp4">
            </video>
            <div class="video-overlay"></div>
        </div>
    </div>

    <section class="home-intro">
        <h2 class="section-title">B3 Running Club</h2>
        <p class="about-intro">A performance-driven community based in Sydney, dedicated to runners chasing the most iconic milestones in amateur marathon running.</p>
        <div class="home-cta-links">
            <a href="/about/" class="cta-link">About Us</a>
            <a href="/activities/" class="cta-link cta-link--secondary">Our Activities</a>
        </div>
    </section>
</main>
{% endblock %}
